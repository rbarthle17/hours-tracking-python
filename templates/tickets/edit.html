{% extends 'base.html' %}
{% block title %} - Edit Ticket{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="bi bi-pencil"></i> Edit Ticket</h1>
                <a href="{{ url_for('tickets.show', id=ticket.id) }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('tickets.update', id=ticket.id) }}">
                        <input type="hidden" name="_method" value="PUT">
                        <div class="mb-3">
                            <label for="client_id" class="form-label">Client <span class="text-danger">*</span></label>
                            <select class="form-select" id="client_id" name="client_id" required>
                                {% for c in clients %}
                                <option value="{{ c.id }}" {{ 'selected' if ticket.client_id == c.id }}>{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title"
                                   value="{{ ticket.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ ticket.description or '' }}</textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option value="open" {{ 'selected' if ticket.status == 'open' }}>Open</option>
                                    <option value="in_progress" {{ 'selected' if ticket.status == 'in_progress' }}>In Progress</option>
                                    <option value="done" {{ 'selected' if ticket.status == 'done' }}>Done</option>
                                    <option value="closed" {{ 'selected' if ticket.status == 'closed' }}>Closed</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="priority" class="form-label">Priority</label>
                                <select class="form-select" id="priority" name="priority">
                                    <option value="low" {{ 'selected' if ticket.priority == 'low' }}>Low</option>
                                    <option value="medium" {{ 'selected' if ticket.priority == 'medium' }}>Medium</option>
                                    <option value="high" {{ 'selected' if ticket.priority == 'high' }}>High</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Update Ticket
                            </button>
                            <a href="{{ url_for('tickets.show', id=ticket.id) }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
