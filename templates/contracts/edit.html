{% extends 'base.html' %}
{% block title %} - Edit Contract{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="bi bi-pencil"></i> Edit Contract</h1>
                <a href="{{ url_for('contracts.show', id=contract.id) }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('contracts.update', id=contract.id) }}">
                        <input type="hidden" name="_method" value="PUT">
                        <div class="mb-3">
                            <label for="client_id" class="form-label">Client <span class="text-danger">*</span></label>
                            <select class="form-select" id="client_id" name="client_id" required>
                                {% for c in clients %}
                                <option value="{{ c.id }}" {{ 'selected' if contract.client_id == c.id }}>{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">Contract Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name"
                                   value="{{ contract.name }}" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="hourly_rate" class="form-label">Hourly Rate <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="hourly_rate" name="hourly_rate"
                                           value="{{ contract.hourly_rate }}" step="0.01" min="0" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option value="active" {{ 'selected' if contract.status == 'active' }}>Active</option>
                                    <option value="paused" {{ 'selected' if contract.status == 'paused' }}>Paused</option>
                                    <option value="completed" {{ 'selected' if contract.status == 'completed' }}>Completed</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="start_date" class="form-label">Start Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="start_date" name="start_date"
                                       value="{{ contract.start_date }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="end_date" class="form-label">End Date</label>
                                <input type="date" class="form-control" id="end_date" name="end_date"
                                       value="{{ contract.end_date or '' }}">
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Update Contract
                            </button>
                            <a href="{{ url_for('contracts.show', id=contract.id) }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
