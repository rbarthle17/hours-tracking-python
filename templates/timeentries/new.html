{% extends 'base.html' %}
{% block title %} - Log Time{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="bi bi-plus-lg"></i> Log Time</h1>
                <a href="{{ url_for('timeentries.index') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('timeentries.create') }}">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="ticket_id" class="form-label">Ticket <span class="text-danger">*</span></label>
                                <select class="form-select" id="ticket_id" name="ticket_id" required>
                                    <option value="">Select a ticket...</option>
                                    {% set current_client = namespace(name='') %}
                                    {% for t in tickets %}
                                        {% if t.client_name != current_client.name %}
                                            {% if current_client.name %}</optgroup>{% endif %}
                                            <optgroup label="{{ t.client_name }}">
                                            {% set current_client.name = t.client_name %}
                                        {% endif %}
                                        <option value="{{ t.id }}">{{ t.title }}</option>
                                    {% endfor %}
                                    {% if current_client.name %}</optgroup>{% endif %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="contract_id" class="form-label">Contract <span class="text-danger">*</span></label>
                                <select class="form-select" id="contract_id" name="contract_id" required>
                                    <option value="">Select a contract...</option>
                                    {% set current_client = namespace(name='') %}
                                    {% for c in contracts %}
                                        {% if c.client_name != current_client.name %}
                                            {% if current_client.name %}</optgroup>{% endif %}
                                            <optgroup label="{{ c.client_name }}">
                                            {% set current_client.name = c.client_name %}
                                        {% endif %}
                                        <option value="{{ c.id }}">{{ c.name }} ({{ format_currency(c.hourly_rate) }}/hr)</option>
                                    {% endfor %}
                                    {% if current_client.name %}</optgroup>{% endif %}
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="entry_date" class="form-label">Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="entry_date" name="entry_date"
                                       value="{{ now.strftime('%Y-%m-%d') }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="hours_worked" class="form-label">Hours <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="hours_worked" name="hours_worked"
                                       step="0.25" min="0.25" max="24" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Log Time
                            </button>
                            <a href="{{ url_for('timeentries.index') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
